<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#000000"/>
  <title>rynhs</title>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
      min-height: 100dvh;
      gap: clamp(32px, 8vw, 56px);
      overflow: hidden;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      transition: opacity 0.6s ease;
    }
    body.fade-out { opacity: 0; }
    .wordmark {
      font-family: 'Italiana', serif;
      font-size: clamp(48px, 16vw, 72px);
      letter-spacing: 0.18em;
      padding-left: 0.18em;
      color: #fff;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    .dot-ring {
      position: relative;
      width: clamp(44px, 12vw, 56px);
      height: clamp(44px, 12vw, 56px);
    }
    .dot {
      position: absolute;
      width: clamp(5px, 1.6vw, 7px);
      height: clamp(5px, 1.6vw, 7px);
      border-radius: 50%;
      background: #fff;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
      will-change: transform, opacity;
      animation: orbit 1.4s cubic-bezier(0.55, 0, 0.45, 1) infinite;
      opacity: 0;
    }
    .dot:nth-child(1) { animation-delay: 0s;    --angle: 0deg;   }
    .dot:nth-child(2) { animation-delay: 0.14s; --angle: 72deg;  }
    .dot:nth-child(3) { animation-delay: 0.28s; --angle: 144deg; }
    .dot:nth-child(4) { animation-delay: 0.42s; --angle: 216deg; }
    .dot:nth-child(5) { animation-delay: 0.56s; --angle: 288deg; }
    @keyframes orbit {
      0%   { opacity: 0; transform: rotate(calc(var(--angle) + 0deg))   translateX(22px) scale(0.6); }
      15%  { opacity: 1; transform: rotate(calc(var(--angle) + 54deg))  translateX(22px) scale(1);   }
      85%  { opacity: 1; transform: rotate(calc(var(--angle) + 306deg)) translateX(22px) scale(1);   }
      100% { opacity: 0; transform: rotate(calc(var(--angle) + 360deg)) translateX(22px) scale(0.6); }
    }
  </style>
</head>
<body>
  <div class="wordmark">rynhs</div>
  <div class="dot-ring">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <script>
    setTimeout(function () {
      document.body.classList.add('fade-out');
      var ua = navigator.userAgent || '';
      var isIOS     = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      setTimeout(function () {
        if (isIOS) {
          window.location = 'vsco://user/ryanhosseini';
          setTimeout(function () {
            window.location = 'https://apps.apple.com/app/vsco/id588013838';
          }, 1500);
        } else if (isAndroid) {
          window.location = 'vsco://user/ryanhosseini';
          setTimeout(function () {
            window.location = 'https://play.google.com/store/apps/details?id=com.vsco.cam';
          }, 1500);
        } else {
          window.location = 'https://vsco.co/ryanhosseini';
        }
      }, 600);
    }, 1800);
  </script>
</body>
</html>
